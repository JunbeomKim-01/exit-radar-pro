version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: toss_sentiment_db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: toss_user
      POSTGRES_PASSWORD: toss_pass
      POSTGRES_DB: toss_sentiment
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: toss_sentiment_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  pgdata:
